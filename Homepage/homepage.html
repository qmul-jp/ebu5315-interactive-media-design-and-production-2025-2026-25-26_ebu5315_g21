<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Geometry Escape Lab | Home</title>

  <link rel="stylesheet" href="shared.css">

  
  <style>
    /* ===== Homepage styles ===== */
    .hero {
      background: var(--bg-elevated);
      padding: 36px 24px;
      border-radius: var(--radius-xl);
      margin-bottom: 32px;
      text-align: center;

      border: none;
      box-shadow: var(--shadow-sm);
    }

    .hero h2 {
      font-size: clamp(2rem, 4vw, 3.1rem);
    }

    .hero p {
      color: var(--text-soft);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin: 28px 0 32px;
    }

    .buttons button {
      width: min(90%, 700px);
      padding: 20px;
      border-radius: 60px;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;

      background: var(--bg-soft);
      border: none;
      outline: none;
      box-shadow: var(--shadow-sm);

      color: var(--text);
    }

    .buttons button:hover {
      background: var(--primary);
      color: var(--nav-hover-text);
    }

    .content {
      display: grid;
      gap: 24px;
    }

    .card {
      background: var(--bg-panel);
      padding: 24px;
      border-radius: var(--radius-md);

      border: none;
      box-shadow: var(--shadow-sm);
    }

    .slider {
      position: relative;
      overflow: hidden;
      padding: 28px 68px;
      min-height: 360px;
    }

    .slide {
      display: none;
      min-height: 300px;
      align-items: center;
    }

    .slide.active {
      display: grid;
    }

    .slide-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(260px, 0.92fr);
      gap: 24px;
      align-items: center;
      min-height: 300px;
    }

    .slide-copy {
      text-align: left;
      max-width: 500px;
      width: 100%;
      margin-left: auto;
      padding-left: 18px;
      padding-right: 34px;
    }

    .slide-copy h3 {
      margin: 0 0 14px;
      font-size: clamp(1.4rem, 2.4vw, 2rem);
      color: var(--heading);
      letter-spacing: -0.01em;
    }

    .slide-copy p {
      margin: 0 0 12px;
      color: var(--text-soft);
      line-height: 1.7;
    }

    .slide-equation {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 8px 14px;
      margin-top: 4px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-strong);
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.28);
    }

    .slide-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide-visual-frame {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 1.18 / 1;
      padding: 14px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(250, 245, 236, 0.95), rgba(244, 237, 225, 0.95));
      border: 1px solid rgba(54, 76, 112, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
    }

    body.dark-mode .slide-visual-frame {
      background: linear-gradient(145deg, rgba(27, 36, 52, 0.95), rgba(22, 32, 49, 0.95));
      border-color: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .slide-visual svg {
      width: 100%;
      height: 100%;
      display: block;
      background: color-mix(in srgb, var(--bg-elevated) 86%, transparent);
      border: 1px solid rgba(54, 76, 112, 0.12);
      border-radius: 18px;
    }

    .slide-visual text {
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 13px;
      fill: var(--svg-label);
      user-select: none;
    }

    .diagram-circle {
      fill: none;
      stroke: var(--svg-circle);
      stroke-width: 2;
    }

    .diagram-line {
      stroke: var(--svg-line);
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .diagram-line.soft {
      stroke-width: 1.6;
      stroke-dasharray: 5 4;
    }

    .diagram-line.accent {
      stroke: var(--gold);
    }

    .diagram-line.blue {
      stroke: var(--blue);
    }

    .diagram-line.green {
      stroke: var(--green);
    }

    .diagram-point {
      stroke: var(--svg-drag-stroke);
      stroke-width: 2;
    }

    .diagram-point.gold { fill: var(--gold); }
    .diagram-point.blue { fill: var(--blue); }
    .diagram-point.green { fill: var(--green); }
    .diagram-point.muted { fill: var(--svg-fixed-point); }

    .diagram-angle {
      fill: rgba(143, 106, 42, 0.12);
      stroke: rgba(143, 106, 42, 0.28);
      stroke-width: 1.2;
    }

    body.dark-mode .diagram-angle {
      fill: rgba(209, 163, 78, 0.16);
      stroke: rgba(209, 163, 78, 0.30);
    }

    .prev,
    .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: rgba(15, 23, 36, 0.42);
      color: white;
      font-size: 24px;
      cursor: pointer;
      border-radius: 50%;
      padding: 8px 12px;
      z-index: 3;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .prev:hover,
    .next:hover {
      transform: translateY(-50%) scale(1.05);
      background: var(--primary);
    }

    .prev {
      left: 14px;
    }

    .next {
      right: 14px;
    }

    .ad-container {
      text-align: center;
      padding: 20px;
      color: var(--text-soft);

      border: none;
      background: var(--bg-soft);
      border-radius: var(--radius-md);
    }

    @media (max-width: 880px) {
      .slider {
        padding: 22px 52px;
        min-height: auto;
      }

      .slide-layout {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .slide-copy {
        max-width: none;
        padding-left: 0;
        padding-right: 0;
      }

      .slide-copy,
      .slide-visual {
        text-align: center;
      }

      .slide-copy .slide-equation {
        justify-content: center;
      }

      .slide-visual-frame {
        max-width: 420px;
        margin: 0 auto;
      }
    }

    @media (max-width: 560px) {
      .slider {
        padding: 18px 46px;
      }

      .prev,
      .next {
        font-size: 20px;
        padding: 7px 10px;
      }

      .slide-visual-frame {
        padding: 10px;
        border-radius: 20px;
      }

      .slide-visual svg {
        border-radius: 14px;
      }
    }
  </style>


  <!-- shared logic (navigation, settings, language) -->
  <script src="shared.js" defer></script>
</head>

        slide2Text2: "∠ACB = 90°",

        slide3Title: "同弧同段角相等",
        slide3Text1: "同一弧在同一弓形内所对的圆周角相等。",
        slide3Text2: "∠ACB = ∠ADB",

        slide4Title: "圆内接四边形",
        slide4Text1: "圆内接四边形的对角互补。",

        slide5Text1: "圆的半径与过切点的切线互相垂直。",

      }
    };

    /* ===== Helpers ===== */
    function getLang() {
      return localStorage.getItem('language') || 'en';
    }

    function tPage(key) {
      const lang = getLang();
      return HOMEPAGE_I18N[lang]?.[key] || HOMEPAGE_I18N.en[key];
    }

    /* ===== Apply language ===== */
    function applyHomepageLanguage() {
      document.documentElement.lang = getLang() === 'zh' ? 'zh' : 'en';

      const map = {
        breadcrumb: '[data-role="breadcrumb-home"]',
        heroTitle: '[data-role="hero-title"]',
        heroSub: '[data-role="hero-sub"]',
        gameBtn: '[data-role="game-btn"]',
        quizBtn: '[data-role="quiz-btn"]',

        slide1Title: '[data-role="slide1-title"]',
        slide1Text1: '[data-role="slide1-text1"]',
        slide1Text2: '[data-role="slide1-text2"]',

        slide2Title: '[data-role="slide2-title"]',
        slide2Text1: '[data-role="slide2-text1"]',
        slide2Text2: '[data-role="slide2-text2"]',

        slide3Title: '[data-role="slide3-title"]',
        slide3Text1: '[data-role="slide3-text1"]',
        slide3Text2: '[data-role="slide3-text2"]',

        slide4Title: '[data-role="slide4-title"]',
        slide4Text1: '[data-role="slide4-text1"]',
        slide4Text2: '[data-role="slide4-text2"]',

        slide5Title: '[data-role="slide5-title"]',
        slide5Text1: '[data-role="slide5-text1"]',
        slide5Text2: '[data-role="slide5-text2"]',

        slide6Title: '[data-role="slide6-title"]',
        slide6Text1: '[data-role="slide6-text1"]',
        slide6Text2: '[data-role="slide6-text2"]',

        slide7Title: '[data-role="slide7-title"]',
        slide7Text1: '[data-role="slide7-text1"]',
        slide7Text2: '[data-role="slide7-text2"]',

        slide8Title: '[data-role="slide8-title"]',
        slide8Text1: '[data-role="slide8-text1"]',
        slide8Text2: '[data-role="slide8-text2"]',

        adText: '[data-role="ad-text"]',
        footerLeft: '[data-role="footer-left"]',
        footerRight: '[data-role="footer-right"]'
      };

      Object.entries(map).forEach(([key, selector]) => {
        const el = document.querySelector(selector);
        if (el) el.textContent = tPage(key);
      });
    }

    /* ===== Carousel ===== */
    const slides = document.querySelectorAll('.slide');
    let index = 0;

    function showSlide(i) {
      slides.forEach((s, idx) => {
        s.classList.toggle('active', idx === i);
      });
    }

    document.querySelector('.next').onclick = () => {
      index = (index + 1) % slides.length;
      showSlide(index);
    };

    document.querySelector('.prev').onclick = () => {
      index = (index - 1 + slides.length) % slides.length;
      showSlide(index);
    };

    /* ===== Navigation ===== */
    document.getElementById('gameMainBtn').onclick = () => location.href = 'Game/index.html';
    document.getElementById('quizMainBtn').onclick = () => location.href = 'c/index.html';

    /* ===== Language sync events ===== */
    window.addEventListener('DOMContentLoaded', applyHomepageLanguage);
    window.addEventListener('focus', applyHomepageLanguage);
    window.addEventListener('storage', applyHomepageLanguage);
    window.addEventListener('languageChanged', applyHomepageLanguage);

  </script>

</body>

</html>
