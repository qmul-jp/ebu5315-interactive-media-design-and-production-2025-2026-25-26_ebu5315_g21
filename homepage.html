<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Geometry Escape Lab | Home</title>

  <link rel="stylesheet" href="shared.css">


  <style>
    /* ===== Homepage styles ===== */
    .hero {
      background: var(--bg-elevated);
      padding: 36px 24px;
      border-radius: var(--radius-xl);
      margin-bottom: 32px;
      text-align: center;

      border: none;
      box-shadow: var(--shadow-sm);
    }

    .hero h2 {
      font-size: clamp(2rem, 4vw, 3.1rem);
    }

    .hero p {
      color: var(--text-soft);
      line-height: 1.35;
      max-width: 1020px;
      margin-left: auto;
      margin-right: auto;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin: 28px 0 32px;
    }

    .buttons button {
      width: min(90%, 700px);
      padding: 20px;
      border-radius: 60px;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;

      background: var(--bg-soft);
      border: none;
      outline: none;
      box-shadow: var(--shadow-sm);

      color: var(--text);
    }

    .buttons button:hover {
      background: var(--primary);
      color: var(--nav-hover-text);
    }

    .content {
      display: grid;
      gap: 24px;
    }

    .card {
      background: var(--bg-panel);
      padding: 24px;
      border-radius: var(--radius-md);

      border: none;
      box-shadow: var(--shadow-sm);
    }

    .card.slider {
      width: min(100%, 1200px);
      margin: 0 auto;
      box-sizing: border-box;
    }

    .slider {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: clamp(18px, 3vw, 28px) clamp(46px, 6vw, 68px);
      min-height: 480px;
      box-sizing: border-box;

      display: flex;
      align-items: stretch;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      min-height: 100%;
      display: flex;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateX(100%);
      transition: transform 0.55s ease, opacity 0.55s ease, visibility 0.55s ease;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateX(0);
      z-index: 2;
    }

    .slide.exit-left {
      opacity: 0;
      visibility: hidden;
      transform: translateX(-100%);
      z-index: 1;
    }

    .slide.exit-right {
      opacity: 0;
      visibility: hidden;
      transform: translateX(100%);
      z-index: 1;
    }

    .slide.enter-from-right {
      opacity: 0;
      visibility: visible;
      transform: translateX(100%);
      z-index: 3;
    }

    .slide.enter-from-left {
      opacity: 0;
      visibility: visible;
      transform: translateX(-100%);
      z-index: 3;
    }

    .slide-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 380px);
      gap: clamp(16px, 2.5vw, 24px);
      align-items: center;
      width: 100%;
      min-height: 100%;
    }

    .slide-copy {
      text-align: left;
      min-width: 0;
      width: 100%;
      max-width: none;

      margin-left: 0;
      padding-left: 80px;
      padding-right: 0;

      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .slide-copy h3 {
      margin: 0 0 14px;
      font-size: clamp(1.4rem, 2.4vw, 2rem);
      color: var(--heading);
      letter-spacing: -0.01em;
    }

    .slide-copy p {
      margin: 0 0 12px;
      color: var(--text-soft);
      line-height: 1.7;
    }

    .slide-copy h3,
    .slide-copy p {
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .slide-equation {
      display: inline-block;
      width: fit-content;
      max-width: 100%;
      align-self: flex-start;

      padding: 4px 10px;
      margin-top: 4px;

      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-strong);

      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    @media (max-width: 880px) {
      .slide-equation {
        align-self: center;
      }
    }

    .slide-visual {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      padding-right: 80px;
    }

    .slide-visual-frame {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 1.18 / 1;
      padding: 14px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(250, 245, 236, 0.95), rgba(244, 237, 225, 0.95));
      border: 1px solid rgba(54, 76, 112, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
    }

    body.dark-mode .slide-visual-frame {
      background: linear-gradient(145deg, rgba(27, 36, 52, 0.95), rgba(22, 32, 49, 0.95));
      border-color: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .slide-visual svg {
      width: 100%;
      height: 100%;
      display: block;
      background: color-mix(in srgb, var(--bg-elevated) 86%, transparent);
      border: 1px solid rgba(54, 76, 112, 0.12);
      border-radius: 18px;
    }

    .slide-visual text {
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 13px;
      fill: var(--svg-label);
      user-select: none;
    }

    .diagram-circle {
      fill: none;
      stroke: var(--svg-circle);
      stroke-width: 2;
    }

    .diagram-line {
      stroke: var(--svg-line);
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .diagram-line.soft {
      stroke-width: 1.6;
      stroke-dasharray: 5 4;
    }

    .diagram-line.accent {
      stroke: var(--gold);
    }

    .diagram-line.blue {
      stroke: var(--blue);
    }

    .diagram-line.green {
      stroke: var(--green);
    }

    .diagram-point {
      stroke: var(--svg-drag-stroke);
      stroke-width: 2;
    }

    .diagram-point.gold {
      fill: var(--gold);
    }

    .diagram-point.blue {
      fill: var(--blue);
    }

    .diagram-point.green {
      fill: var(--green);
    }

    .diagram-point.muted {
      fill: var(--svg-fixed-point);
    }

    .diagram-angle {
      fill: rgba(143, 106, 42, 0.12);
      stroke: rgba(143, 106, 42, 0.28);
      stroke-width: 1.2;
    }

    body.dark-mode .diagram-angle {
      fill: rgba(209, 163, 78, 0.16);
      stroke: rgba(209, 163, 78, 0.30);
    }

    .prev,
    .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: rgba(15, 23, 36, 0.42);
      color: white;
      font-size: 24px;
      cursor: pointer;
      border-radius: 50%;
      padding: 8px 12px;
      z-index: 3;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .prev:hover,
    .next:hover {
      transform: translateY(-50%) scale(1.05);
      background: var(--primary);
    }

    .prev {
      left: 14px;
    }

    .next {
      right: 14px;
    }


    .slider-dots {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 4;
      align-items: center;
      justify-content: center;
    }

    .slider-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: none;
      padding: 0;
      cursor: pointer;
      background: rgba(15, 23, 36, 0.25);
      transition: transform 0.25s ease, background 0.25s ease, opacity 0.25s ease;
      opacity: 0.75;
    }

    .slider-dot:hover {
      transform: scale(1.15);
      opacity: 1;
    }

    .slider-dot.active {
      background: var(--primary);
      transform: scale(1.2);
      opacity: 1;
    }

    body.dark-mode .slider-dot {
      background: rgba(255, 255, 255, 0.28);
    }

    body.dark-mode .slider-dot.active {
      background: var(--primary);
    }

    .ad-container {
      text-align: center;
      padding: 20px;
      color: var(--text-soft);

      border: none;
      background: var(--bg-soft);
      border-radius: var(--radius-md);
    }

    @media (max-width: 880px) {
      .slider {
        padding: 20px 48px;
        min-height: auto;
      }

      .slide.slide-in-right,
      .slide.slide-in-left,
      .slide.slide-out-left,
      .slide.slide-out-right {
        inset: 20px 48px;
      }

      .slide-layout {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .slide-copy {
        max-width: none;
        padding-left: 20px;
        padding-right: 0;
      }

      .slide-copy,
      .slide-visual {
        text-align: center;
      }

      .slide-copy .slide-equation {
        justify-content: center;
      }

      .slide-visual-frame {
        max-width: min(100%, 420px);
        margin: 0 auto;
      }
    }

    @media (max-width: 560px) {
      .slider {
        padding: 16px 42px 44px;
      }

      .slide.slide-in-right,
      .slide.slide-in-left,
      .slide.slide-out-left,
      .slide.slide-out-right {
        inset: 16px 42px 44px;
      }

      .prev,
      .next {
        font-size: 20px;
        padding: 7px 10px;
      }

      .slide-visual-frame {
        padding: 10px;
        border-radius: 20px;
      }

      .slide-visual svg {
        border-radius: 14px;
      }
    }
  </style>


  <!-- shared logic (navigation, settings, language) -->
  <script src="shared.js" defer></script>
</head>

        <div class="slide">

            </div>
            <div class="slide-visual">
              <div class="slide-visual-frame" aria-hidden="true">
                <svg viewBox="0 0 320 220" aria-label="Alternate segment theorem diagram">
                  <circle class="diagram-circle" cx="130" cy="110" r="58" />
                  <line class="diagram-line blue" x1="188" y1="36" x2="188" y2="184" />
                  <line class="diagram-line accent" x1="84" y1="64" x2="188" y2="110" />

    /* ===== Apply language ===== */
    function applyHomepageLanguage() {
      document.documentElement.lang = getLang() === 'zh' ? 'zh' : 'en';

      const map = {

        adText: '[data-role="ad-text"]',

        footerRight: '[data-role="footer-right"]'
      };

      Object.entries(map).forEach(([key, selector]) => {
        const el = document.querySelector(selector);
        if (el) el.textContent = tPage(key);
      });
    }


    function createAnglePath(cx, cy, x1, y1, x2, y2, r = 20) {
      const v1x = x1 - cx;
      const v1y = y1 - cy;
      const v2x = x2 - cx;
      const v2y = y2 - cy;

      const len1 = Math.hypot(v1x, v1y);
      const len2 = Math.hypot(v2x, v2y);
      if (!len1 || !len2) return '';

      const u1x = v1x / len1;
      const u1y = v1y / len1;
      const u2x = v2x / len2;
      const u2y = v2y / len2;

      const startX = cx + u1x * r;
      const startY = cy + u1y * r;
      const endX = cx + u2x * r;
      const endY = cy + u2y * r;

      const cross = u1x * u2y - u1y * u2x;
      const dot = Math.max(-1, Math.min(1, u1x * u2x + u1y * u2y));
      const angle = Math.acos(dot);
      const largeArcFlag = angle > Math.PI ? 1 : 0;
      const sweepFlag = cross > 0 ? 1 : 0;

      return `M ${cx} ${cy} L ${startX} ${startY} A ${r} ${r} 0 ${largeArcFlag} ${sweepFlag} ${endX} ${endY} Z`;
    }

    function setAnglePath(id, cx, cy, x1, y1, x2, y2, r = 20) {
      const el = document.getElementById(id);
      if (!el) return;
      el.setAttribute('d', createAnglePath(cx, cy, x1, y1, x2, y2, r));
    }

      setAnglePath('angle-s2-top', 160, 46, 88, 118, 232, 118, 22);

      setAnglePath('angle-s3-left', 126, 52, 106, 154, 226, 146, 22);

      setAnglePath('angle-s4-right', 230, 91, 118, 52, 194, 173, 16);

      setAnglePath('angle-s5', 200, 110, 136, 110, 200, 182, 16);

      setAnglePath('angle-s7-outer', 250, 110, 161, 64, 161, 156, 22);
      setAnglePath('angle-s7-center', 132, 110, 161, 64, 161, 156, 22);

    /* ===== Carousel ===== */
    const slides = document.querySelectorAll('.slide');
    const slider = document.querySelector('.slider');
    const nextBtn = document.querySelector('.next');
    const prevBtn = document.querySelector('.prev');
    let index = 0;
    let autoSlideTimer = null;
    let isHovered = false;
    let isAnimating = false;

    function cleanupSlideClasses(slide) {
      slide.classList.remove('active', 'exit-left', 'exit-right', 'enter-from-left', 'enter-from-right');
    }

    function showSlide(nextIndex, direction = 'next') {
      if (isAnimating || nextIndex === index) return;

      const currentSlide = slides[index];
      const nextSlide = slides[nextIndex];
      isAnimating = true;

      cleanupSlideClasses(currentSlide);
      cleanupSlideClasses(nextSlide);

      nextSlide.classList.add(direction === 'next' ? 'enter-from-right' : 'enter-from-left');

      requestAnimationFrame(() => {
        currentSlide.classList.add(direction === 'next' ? 'exit-left' : 'exit-right');
        currentSlide.classList.remove('active');

        nextSlide.classList.add('active');
        nextSlide.classList.remove('enter-from-right', 'enter-from-left');
      });

      window.setTimeout(() => {
        cleanupSlideClasses(currentSlide);
        cleanupSlideClasses(nextSlide);
        nextSlide.classList.add('active');
        index = nextIndex;
        isAnimating = false;
      }, 560);
    }

    function nextSlide() {
      showSlide((index + 1) % slides.length, 'next');
    }

    function prevSlide() {
      showSlide((index - 1 + slides.length) % slides.length, 'prev');
    }

    function startAutoSlide() {
      stopAutoSlide();
      if (isHovered) return;
      autoSlideTimer = window.setInterval(() => {
        if (!isHovered && !isAnimating) nextSlide();
      }, 3000);
    }

    function stopAutoSlide() {
      if (autoSlideTimer) {
        window.clearInterval(autoSlideTimer);
        autoSlideTimer = null;
      }
    }

    nextBtn.onclick = () => {
      nextSlide();
      startAutoSlide();
    };

    prevBtn.onclick = () => {
      prevSlide();
      startAutoSlide();
    };

    slider.addEventListener('mouseenter', () => {
      isHovered = true;
      stopAutoSlide();
    });

    slider.addEventListener('mouseleave', () => {
      isHovered = false;
      startAutoSlide();
    });

    /* ===== Navigation ===== */
    document.getElementById('gameMainBtn').onclick = () => location.href = 'gamehome.html';
    document.getElementById('quizMainBtn').onclick = () => location.href = 'index.html';

    /* ===== Language sync events ===== */
    window.addEventListener('DOMContentLoaded', () => {
      applyHomepageLanguage();
      applyAngleMarkers();
      startAutoSlide();
    });
    window.addEventListener('focus', applyHomepageLanguage);
    window.addEventListener('storage', applyHomepageLanguage);
    window.addEventListener('languageChanged', applyHomepageLanguage);

  </script>
