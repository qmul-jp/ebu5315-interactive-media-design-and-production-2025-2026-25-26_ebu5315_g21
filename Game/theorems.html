<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theorem Collection</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="top-tools">
      <div class="tool-group font-tools">
        <span class="tool-label">font size:</span>
        <button class="mini-btn" type="button">-</button>
        <span class="tool-value">8px</span>
        <input type="range" min="8" max="24" value="16" class="font-slider" />
        <span class="tool-value">24px +</span>
      </div>

      <div class="tool-group lang-tools">
        <button class="tool-btn active" type="button">EN</button>
        <button class="tool-btn" type="button">中</button>
      </div>

      <div class="tool-group mode-tools">
        <button class="tool-btn active" type="button">Default</button>
        <button class="tool-btn" type="button">Dark</button>
        <button class="tool-btn" type="button">Eye-friendly</button>
        <button class="tool-btn" type="button">Subtitles</button>
      </div>
    </div>

    <div class="main-nav">
      <a href="homepage.html" class="brand">Geometry Escape Lab</a>

      <nav class="nav-links">
        <a href="homepage.html">Home</a>
        <a href="index.html" class="active" aria-current="page">Game</a>
        <a href="#">Quiz</a>
        <a href="#">About</a>
      </nav>
    </div>
  </header>

  <div class="breadcrumb-bar">
    <div class="breadcrumb">
      <a href="homepage.html">Home</a>
      <span>›</span>
      <a href="index.html">Game</a>
      <span>›</span>
      <strong>Theorem Collection</strong>
    </div>
  </div>

  <main class="container">
    <section class="page-header center">
      <h1>Theorem Collection</h1>
      <p class="subtitle">Collected properties will unlock after each room is cleared.</p>
    </section>

    <section class="card">
      <div id="theoremList"></div>
    </section>

    <div class="center">
      <button class="btn primary" onclick="location.href='index.html'">Back to Game</button>
    </div>
  </main>

  <footer class="footer">Interactive Geometry Learning Platform</footer>

  <script>
    const highestCleared = parseInt(localStorage.getItem("highestCleared") || "0", 10);

    const theoremData = [
      {
        title: "Angle at the Centre",
        property: "The angle at the centre is twice the angle at the circumference standing on the same arc."
      },
      {
        title: "Angles in a Semicircle",
        property: "The angle in a semicircle is 90°."
      },
      {
        title: "Angles in the Same Segment",
        property: "Angles in the same segment are equal."
      },
      {
        title: "Cyclic Quadrilateral",
        property: "Opposite angles in a cyclic quadrilateral sum to 180°."
      },
      {
        title: "Radius to a Tangent",
        property: "A radius to the point of tangency is perpendicular to the tangent."
      },
      {
        title: "Tangents from a Point are Equal",
        property: "Tangents drawn from the same external point are equal in length."
      },
      {
        title: "Angle Between Two Tangents",
        property: "The angle between two tangents and the central angle sum to 180°."
      },
      {
        title: "Alternate Segment Theorem",
        property: "The angle between a tangent and a chord equals the angle in the alternate segment."
      }
    ];

    const theoremList = document.getElementById("theoremList");

    theoremData.forEach((item, index) => {
      const unlocked = index + 1 <= highestCleared;

      const box = document.createElement("div");
      box.className = "theorem-item";

      box.innerHTML = `
        <div>
          <h3>${unlocked ? "✓" : "🔒"} ${item.title}</h3>
          <p>${unlocked ? item.property : "Clear the corresponding room to unlock this theorem."}</p>
        </div>
        <button class="btn ${unlocked ? "primary" : ""}" ${unlocked ? "" : "disabled"}>
          ${unlocked ? "Unlocked" : "Locked"}
        </button>
      `;

      theoremList.appendChild(box);
    });
  </script>
</body>
</html>
