<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Rooms Completed</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="game.css" />
</head>
<body>

  <header>
    <div class="header-left">
      <h1>Geometry Escape Lab</h1>
      <div class="breadcrumb">
        <a href="homepage.html">Home</a> &nbsp;›&nbsp;
        <a href="index.html">Game</a> &nbsp;›&nbsp; <span>Completion</span>
      </div>
    </div>
    <nav>
      <button id="navHomeBtn">Home</button>
      <button id="navGameBtn" class="active-nav">Game</button>
      <button id="navQuizBtn">Quiz</button>
      <button type="button" id="settingsBtn">Settings</button>
      <div class="nav-group">

        <div class="dropdown-content">
          <a href="#" id="contactBtn">Contact us</a>
          <a href="#" id="supportBtn">About this project</a>
          <a href="#" id="accessibilityBtn">Accessibility help</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="card complete-card center">
      <h1>🎉 You completed all 8 rooms.</h1>
      <p class="small-text">Great job! You can go back to the game page or open the theorem collection.</p>
      <div class="complete-actions">
        <button class="btn secondary" onclick="location.href='index.html'">Back to Game</button>
        <button class="btn primary" onclick="location.href='theorems.html'">Go to Theorems</button>
      </div>
    </section>
  </main>

  <div id="modal" class="modal">
    <div class="modal-content">
      <button class="close" type="button" aria-label="Close">&times;</button>
      <h2 id="modal-title">Settings</h2>
      <div id="modal-text"></div>
    </div>
  </div>

  <footer class="footer"><div class="footer-inner"><span>Interactive Geometry Learning Platform</span><span>Completion</span></div></footer>
  <script src="shared.js"></script>
